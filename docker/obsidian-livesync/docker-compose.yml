services:
  couchdb-obsidian-livesync:
    image: docker.io/oleduc/docker-obsidian-livesync-couchdb:master
    container_name: couchdb-obsidian-livesync
    restart: always
    env_file:
      - .env
    ports:
      - 127.0.0.1:5984:5984 # loopback-only: Docker bypasses UFW, so without this the port is publicly reachable; Caddy proxies from the host and only needs localhost
    volumes:
      - /opt/couchdb/data:/opt/couchdb/data
