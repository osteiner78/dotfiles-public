services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    volumes:
      - /opt/uptime-kuma/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      # <Host Port>:<Container Port>
      - 127.0.0.1:3001:3001 # loopback-only: Docker bypasses UFW, so without this the port is publicly reachable; Caddy proxies from the host and only needs localhost
    restart: unless-stopped
