
[ env ]
TERM = "xterm-256color"

[window]
padding.x = 5
padding.y = 5

decorations = "Buttonless"
opacity=0.85
# blur=false
blur=true

dynamic_title=false

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

# [font]
# normal.family = "JetBrainsMono NF"

# normal.family = "JetBrainsMono Nerd Font Mono" # -- > glyphs are rendered small
# normal.family = "MesloLGS NF"
# normal.family = "Inconsolata"

#regular
# size = 14

#for video
# size = 35.0

[selection]
save_to_clipboard=true
# save_to_clipboard=false

[cursor]
style = {shape = "Underline", blinking= "Off"}

[general]
import = [
    "~/.config/alacritty/themes/themes/gruvbox_material_medium_dark.toml",
    "~/.config/alacritty/local.toml",
    # "~/.config/alacritty/themes/themes/github_light.toml"
]

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"
