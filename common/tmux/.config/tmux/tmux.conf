# For reference: https://wiki.archlinux.org/title/Tmux

# ================== TERMINAL & GUI ==================
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set -g status-position top
set -g set-titles on
set -g set-titles-string "#S / #W"
set-option -g pane-border-lines double

# ================== KEYBINDS ==================
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Splitting windows (preserve path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf

# Navigation & Resizing
bind -n M-H previous-window
bind -n M-L next-window
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# ================== SYSTEM SETTINGS ==================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g status-interval 5
set -sg escape-time 10
set -g focus-events on
set -g history-limit 10000

# Activity Monitoring
setw -g monitor-activity on
set -g visual-activity off

# Vi mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ================== PLUGINS ==================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @continuum-restore 'on'
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'

# ================== YAZI IMAGE PREVIEW ==================
set -g allow-passthrough all
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ================== INITIALIZE TPM ==================
run '~/.config/tmux/plugins/tpm/tpm'

# ================== POST-TPM OVERRIDES (FINAL THEME) ==================
# We define everything here explicitly to ensure:
# 1. Colors and shapes are correct (not overwritten by theme plugin)
# 2. Shell commands (#( )) are evaluated correctly (not broken by variables)

set -g status-left-length 60
set -g status-left "#[fg=colour237,bg=colour130] #H #[fg=colour130,bg=colour214]#[fg=colour237,bg=colour214] #{user} #[fg=colour214,bg=colour237]   "

set -g status-right-length 150
set -g status-right "#[fg=colour66,bg=colour237]#[fg=colour235,bg=colour66] CPU: #(~/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) | RAM: #(~/.config/tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) | IP: #(hostname -I | cut -d' ' -f1) #[fg=colour66,bg=colour237]  #[fg=colour130,bg=colour237]#[fg=colour235,bg=colour130] %H:%M "


# Window Status (Pills)
set-window-option -g window-status-current-style bg=colour237
set-window-option -g window-status-current-format "#[fg=colour239,bg=colour237] #[fg=colour223,bg=colour239] #I #W #[fg=colour239,bg=colour237]"
set-window-option -g window-status-format "#[fg=colour246,bg=colour237] #I #W "
set-window-option -g window-status-separator ""

# Pane Borders
set -g pane-active-border-style "fg=colour66"
set -g pane-border-style "fg=colour237"
