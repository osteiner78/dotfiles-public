general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = niri msg action power-off-monitors  # to avoid having to press a key twice to turn on the display.
    # after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

# turn off keyboard backlight, comment out this section if you dont have a keyboard backlight.
listener { 
    timeout = 60
    on-timeout = brightnessctl -d 'kbd_backlight' -s set 0 # save then set 0
    on-resume = brightnessctl -d 'kbd_backlight' -r # restore exactly

    # on-timeout = brightnessctl -sd rgb:kbd_backlight set 0 # turn off keyboard backlight.
    # on-resume = brightnessctl -rd rgb:kbd_backlight        # turn on keyboard backlight.
}

listener {
    timeout = 120
    on-timeout = sh -lc 'notify-send -u low "Idle" "Screen dimmed" || true; brightnessctl -s set 05' # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

listener {
    timeout = 300
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 360
    on-timeout = niri msg action power-off-monitors                     # screen off when timeout has passed
    # on-timeout = hyprctl dispatch dpms off                            # screen off when timeout has passed
    on-resume = niri msg action power-on-monitors && brightnessctl -r   # screen on when activity is detected after timeout has fired.
    # on-resume = hyprctl dispatch dpms on && brightnessctl -r          # screen on when activity is detected after timeout has fired.
}

listener {
    timeout = 600
    on-timeout = systemctl suspend                # suspend pc
}
