monitor.bluez.properties = {
    # Force high-quality SBC-XQ (more stable than AAC on older Macs)
    bluez5.enable-sbc-xq = true
    # Disable the choppy headset microphone profile
    bluez5.roles = [ a2dp_sink a2dp_source ]
    # Stop auto-switching which causes the "cuts"
    bluez5.autoswitch-profile = false
}
