# Preload images (faster, avoids flicker)
# preload = ~/Pictures/wallpapers/gruvbox.jpg

# One wallpaper per monitor (use `hyprctl monitors` to get names)
# wallpaper = eDP-1,~/Pictures/wallpapers/gruvbox.jpg
# wallpaper = HDMI-A-1,~/Pictures/wallpapers/gruvbox.jpg

# Optional tweaks
splash = false
ipc = on
