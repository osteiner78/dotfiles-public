
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

source = ~/.config/hypr/keybinds.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,preferred,232x1440,1.33333333
monitor=HDMI-A-1,preferred,0x0,1.0
# monitor=eDP-1,3024x1890@60,0x0,1.5
# monitor=HDMI-A-1,2560x1440@60,0x0,1.0

# Disable internal when lid closes
bindl = , switch:on:Apple SMC power/lid events, exec, hyprctl keyword monitor "eDP-1,disable"

# Re-enable internal when lid opens (preferred mode, auto position, scale 1 — tweak as you like)
bindl = , switch:off:Apple SMC power/lid events, exec, sh -c 'sleep 0.2; hyprctl keyword monitor "eDP-1,preferred,232x1440,1.5"'

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
# $fileManager = dolphin

source = ~/.config/hypr/autostart.conf

############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

# Cursor size
env = HYPRCURSOR_THEME,bibata-modern-classic
# env = HYPRCURSOR_THEME,catppuccin-macchiato-dark-cursors
env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24

# Force all apps to use Wayland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

xwayland {
  force_zero_scaling = true
  use_nearest_neighbor = true
}

# Use XCompose file
env = XCOMPOSEFILE,~/.XCompose

# Don't show update on first launch
ecosystem {
  no_update_news = true
}

source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf

#################
### PLUGINS ###
#################
# Hyprspace
plugin {
    overview {
        disableBlur = 1
        
        panelHeight = 230
        # panelBorderColor = 0000000
        reverseSwipe = true
        workspaceBorderSize = 4
        centerAligned = 1
        workspaceMargin = 35

        hideBackgroundLayers = 0
        hideTopLayers = 0
        hideOverlayLayers = 0
        hideRealLayers = 0
        
        overrideAnimSpeed = 0

        drawActiveWorkspace = 1
        # gaps around active workspace
        overrideGaps = 1
        gapsIn = 10
        gapsOut = 10
    }
    hyprexpo {
        columns = 3
        gap_size = 25
        bg_col = rgb(3C3836)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        enable_gesture = true # laptop touchpad
        gesture_fingers = 3  # 3 or 4
        gesture_distance = 300 # how far is the "max"
        gesture_positive = true # positive = swipe down. Negative = swipe up.
    }
}

source = ~/.config/hypr/windows.conf
