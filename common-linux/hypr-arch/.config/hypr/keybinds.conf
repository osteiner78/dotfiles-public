# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER
$HYPER = CONTROL SUPER ALT SHIFT

# --- Helpers ---
$focusorlaunch = ~/.config/hypr/scripts/hypr-focus-or-launch

# --- Launchers ---
$terminal = alacritty
$browser = firefox
$fileManager = dolphin
$fileManagerClass = org.kde.dolphin
$menu = ~/.config/rofi/scripts/launcher_t1
# $menu = rofi -show drun

# ========================= APPS (WITH HYPER) ==============================
# Regular apps
bind = $HYPER, 1, exec, 1password
bind = $HYPER, q, exec, $terminal
bind = $HYPER, a, exec, ~/.config/hypr/scripts/hypr-focus-browser
bind = $HYPER, f, exec, $focusorlaunch $fileManagerClass $fileManager

bind = $HYPER, o, exec, $focusorlaunch obsidian obsidian
bind = $HYPER, v, exec, $focusorlaunch code code

# ========================= WEB APPS (WITH HYPER) ==============================
# ---- APP IDs (single source of truth) ----
$APPID_GCALENDAR    = kjbdgfilnfhdoflbpgamdcdgpehopbep
$APPID_GMAIL        = fmgjjmmmlfnkbppncabfkddbjimcfncm
$APPID_GMAPS        = mnhkaebcjjhencmpkapnbdaogjamfbcj
$APPID_PAPERLESS    = hobmfnofdkcfacpggknhmphkfebfeopg
$APPID_TODOIST      = dlgohinmglaoopaiplliaecdpmnepmga
$APPID_WHATSAPP     = hnpfjngllnobngcgfapefoaidbinmjnm
$APPID_GEMINI       = caidcmannjgahlnbpmidmiecjcoiiigg
$APPID_CHATGPT      = cadlkienfkclaiaibeoongdcgmdikeeg

bind = $HYPER, c, exec, $focusorlaunch webapp $APPID_GCALENDAR
bind = $HYPER, g, exec, $focusorlaunch webapp $APPID_GMAIL
bind = $HYPER, m, exec, $focusorlaunch webapp $APPID_GMAPS
bind = $HYPER, p, exec, $focusorlaunch webapp $APPID_PAPERLESS
bind = $HYPER, t, exec, $focusorlaunch webapp $APPID_TODOIST
bind = $HYPER, w, exec, $focusorlaunch webapp $APPID_WHATSAPP
bind = $HYPER, x, exec, $focusorlaunch webapp $APPID_GEMINI
bind = $HYPER, z, exec, $focusorlaunch webapp $APPID_CHATGPT

# ========================= MAIN/SYSTEM ==============================
# bind = CONTROL  , RETURN, exec, $terminal
bind = CONTROL  , space, exec, $menu
bind = CONTROL SHIFT    , 4, exec, hyprshot -m region --clipboard-only

bind = $mainMod, TAB, focuscurrentorlast # needed for CMD tap-to-toggle (keyd config)

bind = $mainMod , RETURN, exec, $terminal
# bind = $mainMod , space, exec, $menu
bind = $mainMod, b, exec, ~/.config/waybar/scripts/waybar-toggle.sh
bind = $mainMod, d, exec, ~/.config/hypr/scripts/hypr-toggle-dark.sh
bind = $mainMod, f, fullscreenstate, 1
# bind = $mainMod, j, togglesplit, # dwindle
# bind = $mainMod, m, exec, ~/.config/hypr/scripts/confirm-exit.sh
bind = $mainMod, n, exec, alacritty -e nvim
# bind = $mainMod, p, pseudo, # dwindle
bind = $mainMod, t, exec, alacritty -e btop
bind = $mainMod, v, togglefloating,
bind = $mainMod, w, killactive,
bind = , XF86LaunchA, exec, hyprctl dispatch overview:toggle # Mission Control key (F3)
bind = , XF86LaunchB, hyprexpo:expo, toggle # Dashboard key (F4)
# bind = , XF86LaunchB, exec, hyprctl dispatch hyprexpo:expo toggle # Dashboard key (F4)
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/visual-profile.sh --toggle

source = ~/.config/hypr/bindings/tiling.conf
source = ~/.config/hypr/bindings/media.conf

# ====================== TRACKPAD GESTURES ========================
gesture = 3, horizontal, workspace
gesture = 4, up, fullscreen, maximize
gesture = 4, down, fullscreen, maximize
gesture = 3, pinch, float
gesture = 3, down, dispatcher, hyprexpo:expo, on
gesture = 3, up, dispatcher, hyprexpo:expo, off
# gesture = 3, pinchin, float, float
# gesture = 3, pinchout, float, tile
