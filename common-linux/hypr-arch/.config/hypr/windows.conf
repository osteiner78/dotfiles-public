windowrulev2 = workspace 1, class:^chrome-$APPID_CHATGPT-.*$

windowrulev2 = workspace 2, class:^(zen)$
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(chromium-browser)$

